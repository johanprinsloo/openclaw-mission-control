name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allows manual triggering from the GitHub Actions UI

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  LIGHTSAIL_SERVICE_NAME: ${{ vars.LIGHTSAIL_SERVICE_NAME }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mission_control_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-packages --group dev

    - name: Run tests
      run: uv run pytest packages/server/tests/ -v --tb=short
      env:
        MC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mission_control_test
        MC_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mission_control_test
        MC_SECRET_KEY: ${{ secrets.SECRET_KEY }}
        MC_DEBUG: 'true'

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    name: Build and Deploy to Lightsail
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Install lightsailctl plugin
      run: |
        curl -s "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o /usr/local/bin/lightsailctl
        chmod +x /usr/local/bin/lightsailctl

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t mission-control:${{ github.sha }} .
        docker tag mission-control:${{ github.sha }} mission-control:latest

    - name: Ensure Lightsail Service exists
      run: |
        # Try to get service, create if it doesn't exist
        if ! aws lightsail get-container-services --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} --region ${{ vars.AWS_REGION }} > /dev/null 2>&1; then
          echo "📝 Creating new Lightsail container service: ${{ vars.LIGHTSAIL_SERVICE_NAME }}"
          aws lightsail create-container-service \
            --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
            --power nano \
            --scale 1 \
            --region ${{ vars.AWS_REGION }}
        else
          echo "✅ Service ${{ vars.LIGHTSAIL_SERVICE_NAME }} already exists."
        fi

    - name: Push to Lightsail Container Registry
      run: |
        aws lightsail push-container-image \
          --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
          --label app \
          --image mission-control:latest \
          --region ${{ vars.AWS_REGION }}

    - name: Get container image digest
      id: get-image
      run: |
        IMAGE_DIGEST=$(aws lightsail get-container-images \
          --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
          --region ${{ vars.AWS_REGION }} \
          --query 'containerImages[0].image' \
          --output text)
        echo "image=$IMAGE_DIGEST" >> $GITHUB_OUTPUT

    - name: Deploy to Lightsail
      run: |
        aws lightsail create-container-service-deployment \
          --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
          --region ${{ vars.AWS_REGION }} \
          --containers "{
            \"app\": {
              \"image\": \"${{ steps.get-image.outputs.image }}\",
              \"ports\": {\"8000\": \"HTTP\"},
              \"environment\": {
                \"MC_DEBUG\": \"false\",
                \"MC_DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                \"MC_SECRET_KEY\": \"${{ secrets.SECRET_KEY }}\",
                \"MC_CORS_ORIGINS\": \"${{ vars.CORS_ORIGINS }}\",
                \"MC_REDIS_URL\": \"redis://localhost:6379/0\"
              }
            },
            \"redis\": {
              \"image\": \"redis:7-alpine\",
              \"environment\": {
                \"REDIS_ARGS\": \"--maxmemory 128mb --maxmemory-policy allkeys-lru\"
              }
            }
          }" \
          --public-endpoint "{
            \"containerName\": \"app\",
            \"containerPort\": 8000,
            \"healthCheck\": {
              \"path\": \"/health\",
              \"intervalSeconds\": 30,
              \"timeoutSeconds\": 5,
              \"healthyThreshold\": 2,
              \"unhealthyThreshold\": 3
            }
          }"

    - name: Wait for deployment
      run: |
        echo "Waiting for deployment to complete..."
        for i in $(seq 1 30); do
          STATE=$(aws lightsail get-container-services \
            --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
            --region ${{ vars.AWS_REGION }} \
            --query 'containerServices[0].state' \
            --output text)
          echo "  Attempt $i/30 — state: $STATE"
          if [ "$STATE" = "RUNNING" ]; then
            echo "Deployment complete!"
            exit 0
          elif [ "$STATE" = "DEPLOYING" ] || [ "$STATE" = "UPDATING" ]; then
            sleep 20
          else
            echo "Unexpected state: $STATE"
            exit 1
          fi
        done
        echo "Timed out waiting for deployment (10 min)"
        exit 1

    - name: Get deployment URL
      run: |
        URL=$(aws lightsail get-container-services \
          --service-name ${{ vars.LIGHTSAIL_SERVICE_NAME }} \
          --region ${{ vars.AWS_REGION }} \
          --query 'containerServices[0].url' \
          --output text)
        echo "Deployed to: $URL"
        echo "DEPLOYMENT_URL=$URL" >> $GITHUB_ENV

    - name: Notify on success
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🌐 Application URL: ${{ env.DEPLOYMENT_URL }}"

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
